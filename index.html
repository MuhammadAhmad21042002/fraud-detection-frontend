<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBL Fraud Detection System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        
        // Lucide React icons as inline SVG components
        const Upload = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );

        const CheckCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const AlertCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const Download = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const Calendar = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const Shield = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        );

        const Database = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </svg>
        );

        const TrendingUp = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        // API Configuration
        const API_BASE_URL = 'http://localhost:8000';

        const FraudDetectionApp = () => {
          const [activeTab, setActiveTab] = useState('generate');
          const [loading, setLoading] = useState(false);
          const [message, setMessage] = useState(null);

          // Generate Rules State
          const [rulesFile, setRulesFile] = useState(null);
          const [rulesDate, setRulesDate] = useState('');

          // Detect Fraud State
          const [detectFile, setDetectFile] = useState(null);
          const [detectionDate, setDetectionDate] = useState('');
          const [ruleFileDate, setRuleFileDate] = useState('');

          const validateDate = (dateStr) => {
            const regex = /^(\d{2})\/(\d{2})\/(\d{4})$/;
            if (!regex.test(dateStr)) return false;
            const [, day, month, year] = regex.exec(dateStr);
            const date = new Date(year, month - 1, day);
            return date.getFullYear() == year && date.getMonth() == month - 1 && date.getDate() == day;
          };

          const handleGenerateRules = async (e) => {
            e.preventDefault();
            
            if (!rulesFile) {
              setMessage({ type: 'error', text: 'Please upload a CSV file' });
              return;
            }

            if (!validateDate(rulesDate)) {
              setMessage({ type: 'error', text: 'Please enter a valid date in DD/MM/YYYY format' });
              return;
            }

            setLoading(true);
            setMessage(null);

            const formData = new FormData();
            formData.append('file', rulesFile);
            formData.append('input_date', rulesDate);

            try {
              const response = await fetch(`${API_BASE_URL}/api/v1/generate-rules`, {
                method: 'POST',
                body: formData,
              });

              const data = await response.json();

              if (response.ok) {
                setMessage({
                  type: 'success',
                  text: `Rules generated successfully for ${data.accounts_processed} accounts. Rules file: ${data.rules_file}`,
                  details: data
                });
                setRulesFile(null);
                setRulesDate('');
                document.getElementById('rules-file-input').value = '';
              } else {
                setMessage({ type: 'error', text: data.detail || 'Failed to generate rules' });
              }
            } catch (error) {
              setMessage({ type: 'error', text: 'Network error. Please ensure the backend is running on http://localhost:8000' });
            } finally {
              setLoading(false);
            }
          };

          const handleDetectFraud = async (e) => {
            e.preventDefault();

            if (!detectFile) {
              setMessage({ type: 'error', text: 'Please upload a CSV file' });
              return;
            }

            if (!validateDate(detectionDate) || !validateDate(ruleFileDate)) {
              setMessage({ type: 'error', text: 'Please enter valid dates in DD/MM/YYYY format' });
              return;
            }

            setLoading(true);
            setMessage(null);

            const formData = new FormData();
            formData.append('file', detectFile);
            formData.append('detection_date', detectionDate);
            formData.append('rules_date', ruleFileDate);

            try {
              const response = await fetch(`${API_BASE_URL}/api/v1/detect-fraud`, {
                method: 'POST',
                body: formData,
              });

              if (response.ok) {
                const blob = await response.blob();
                
                const contentDisposition = response.headers.get('Content-Disposition');
                const filenameMatch = contentDisposition && contentDisposition.match(/filename="?(.+)"?/);
                const filename = filenameMatch ? filenameMatch[1] : `fraud_detection_results_${Date.now()}.csv`;

                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                setMessage({
                  type: 'success',
                  text: `Fraud detection completed! Results downloaded as ${filename}`
                });
                
                setDetectFile(null);
                setDetectionDate('');
                setRuleFileDate('');
                document.getElementById('detect-file-input').value = '';
              } else {
                const data = await response.json();
                setMessage({ type: 'error', text: data.detail || 'Failed to detect fraud' });
              }
            } catch (error) {
              setMessage({ type: 'error', text: 'Network error. Please ensure the backend is running on http://localhost:8000' });
            } finally {
              setLoading(false);
            }
          };

          const FileUploadZone = ({ file, onChange, id, accept = ".csv" }) => {
            const [isDragging, setIsDragging] = useState(false);

            const handleDragOver = (e) => {
              e.preventDefault();
              setIsDragging(true);
            };

            const handleDragLeave = () => {
              setIsDragging(false);
            };

            const handleDrop = (e) => {
              e.preventDefault();
              setIsDragging(false);
              const droppedFile = e.dataTransfer.files[0];
              if (droppedFile && droppedFile.name.endsWith('.csv')) {
                onChange(droppedFile);
              }
            };

            return (
              <div
                className={`upload-zone ${isDragging ? 'dragging' : ''} ${file ? 'has-file' : ''}`}
                onDragOver={handleDragOver}
                onDragLeave={handleDragLeave}
                onDrop={handleDrop}
              >
                <input
                  type="file"
                  id={id}
                  accept={accept}
                  onChange={(e) => onChange(e.target.files[0])}
                  style={{ display: 'none' }}
                />
                <label htmlFor={id} className="upload-label">
                  {file ? (
                    <>
                      <CheckCircle size={32} className="upload-icon success" />
                      <div className="file-name">{file.name}</div>
                      <div className="file-size">{(file.size / 1024).toFixed(2)} KB</div>
                    </>
                  ) : (
                    <>
                      <Upload size={32} className="upload-icon" />
                      <div className="upload-text">
                        <strong>Drop CSV file here</strong> or click to browse
                      </div>
                      <div className="upload-hint">Maximum file size: 50MB</div>
                    </>
                  )}
                </label>
              </div>
            );
          };

          return (
            <div className="app-container">
              <header className="header">
                <div className="header-content">
                  <div className="logo">
                    <Shield size={32} />
                    <div className="logo-text">
                      <h1>UBL Fraud Detection</h1>
                      <p>United Bank Limited</p>
                    </div>
                  </div>
                  <div className="header-stats">
                    <div className="stat">
                      <Database size={18} />
                      <span>Real-time Analysis</span>
                    </div>
                    <div className="stat">
                      <TrendingUp size={18} />
                      <span>AI-Powered</span>
                    </div>
                  </div>
                </div>
              </header>

              <nav className="tab-navigation">
                <button
                  className={`tab ${activeTab === 'generate' ? 'active' : ''}`}
                  onClick={() => {
                    setActiveTab('generate');
                    setMessage(null);
                  }}
                >
                  <Calendar size={20} />
                  Generate Rules
                </button>
                <button
                  className={`tab ${activeTab === 'detect' ? 'active' : ''}`}
                  onClick={() => {
                    setActiveTab('detect');
                    setMessage(null);
                  }}
                >
                  <Shield size={20} />
                  Detect Fraud
                </button>
              </nav>

              <main className="main-content">
                {message && (
                  <div className={`message ${message.type}`}>
                    {message.type === 'success' ? (
                      <CheckCircle size={20} />
                    ) : (
                      <AlertCircle size={20} />
                    )}
                    <div className="message-content">
                      <div className="message-text">{message.text}</div>
                      {message.details && (
                        <div className="message-details">
                          <div>Date Range: {message.details.date_range.start} to {message.details.date_range.end}</div>
                          <div>Accounts Processed: {message.details.accounts_processed}</div>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {activeTab === 'generate' && (
                  <div className="panel">
                    <div className="panel-header">
                      <h2>Generate Fraud Detection Rules</h2>
                      <p>Analyze historical transaction data to create account-specific behavioral rules</p>
                    </div>

                    <form onSubmit={handleGenerateRules} className="form">
                      <div className="form-group">
                        <label className="form-label">
                          <Database size={18} />
                          Transaction Data (CSV)
                        </label>
                        <FileUploadZone
                          file={rulesFile}
                          onChange={setRulesFile}
                          id="rules-file-input"
                        />
                        <div className="form-hint">
                          Required columns: account_number, transaction_id, transaction_timestamp, 
                          transaction_amount, cr_dr_ind, New Beneficiary Flag, device_id, transaction_type_code
                        </div>
                      </div>

                      <div className="form-group">
                        <label className="form-label" htmlFor="rules-date">
                          <Calendar size={18} />
                          Reference Date
                        </label>
                        <input
                          type="text"
                          id="rules-date"
                          className="date-input"
                          placeholder="DD/MM/YYYY"
                          value={rulesDate}
                          onChange={(e) => setRulesDate(e.target.value)}
                          maxLength={10}
                        />
                        <div className="form-hint">
                          Rules will be generated from 3 months before this date
                        </div>
                      </div>

                      <button
                        type="submit"
                        className="submit-button"
                        disabled={loading}
                      >
                        {loading ? (
                          <>
                            <div className="spinner" />
                            Processing...
                          </>
                        ) : (
                          <>
                            <TrendingUp size={20} />
                            Generate Rules
                          </>
                        )}
                      </button>
                    </form>
                  </div>
                )}

                {activeTab === 'detect' && (
                  <div className="panel">
                    <div className="panel-header">
                      <h2>Detect Fraudulent Transactions</h2>
                      <p>Apply detection rules to identify potentially fraudulent activities</p>
                    </div>

                    <form onSubmit={handleDetectFraud} className="form">
                      <div className="form-group">
                        <label className="form-label">
                          <Database size={18} />
                          Transaction Data (CSV)
                        </label>
                        <FileUploadZone
                          file={detectFile}
                          onChange={setDetectFile}
                          id="detect-file-input"
                        />
                        <div className="form-hint">
                          Upload transaction data for fraud analysis
                        </div>
                      </div>

                      <div className="form-row">
                        <div className="form-group">
                          <label className="form-label" htmlFor="detection-date">
                            <Calendar size={18} />
                            Detection Date
                          </label>
                          <input
                            type="text"
                            id="detection-date"
                            className="date-input"
                            placeholder="DD/MM/YYYY"
                            value={detectionDate}
                            onChange={(e) => setDetectionDate(e.target.value)}
                            maxLength={10}
                          />
                          <div className="form-hint">Date to analyze for fraud</div>
                        </div>

                        <div className="form-group">
                          <label className="form-label" htmlFor="rules-file-date">
                            <Shield size={18} />
                            Rules Date
                          </label>
                          <input
                            type="text"
                            id="rules-file-date"
                            className="date-input"
                            placeholder="DD/MM/YYYY"
                            value={ruleFileDate}
                            onChange={(e) => setRuleFileDate(e.target.value)}
                            maxLength={10}
                          />
                          <div className="form-hint">Date of rules file to use</div>
                        </div>
                      </div>

                      <button
                        type="submit"
                        className="submit-button detect"
                        disabled={loading}
                      >
                        {loading ? (
                          <>
                            <div className="spinner" />
                            Analyzing...
                          </>
                        ) : (
                          <>
                            <Download size={20} />
                            Detect & Download Results
                          </>
                        )}
                      </button>
                    </form>
                  </div>
                )}
              </main>

              <style>{`
                * {
                  margin: 0;
                  padding: 0;
                  box-sizing: border-box;
                }

                body {
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                  background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
                  min-height: 100vh;
                  color: #e4e7eb;
                }

                .app-container {
                  min-height: 100vh;
                  padding-bottom: 40px;
                }

                .header {
                  background: rgba(15, 20, 25, 0.8);
                  backdrop-filter: blur(20px);
                  border-bottom: 1px solid rgba(52, 211, 153, 0.1);
                  padding: 24px 0;
                  position: sticky;
                  top: 0;
                  z-index: 100;
                }

                .header-content {
                  max-width: 1200px;
                  margin: 0 auto;
                  padding: 0 32px;
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                }

                .logo {
                  display: flex;
                  align-items: center;
                  gap: 16px;
                }

                .logo svg {
                  color: #34d399;
                  filter: drop-shadow(0 0 8px rgba(52, 211, 153, 0.3));
                }

                .logo-text h1 {
                  font-size: 24px;
                  font-weight: 700;
                  color: #ffffff;
                  letter-spacing: -0.5px;
                }

                .logo-text p {
                  font-size: 13px;
                  color: #9ca3af;
                  margin-top: 2px;
                }

                .header-stats {
                  display: flex;
                  gap: 24px;
                }

                .stat {
                  display: flex;
                  align-items: center;
                  gap: 8px;
                  font-size: 14px;
                  color: #9ca3af;
                }

                .stat svg {
                  color: #34d399;
                }

                .tab-navigation {
                  max-width: 1200px;
                  margin: 32px auto 0;
                  padding: 0 32px;
                  display: flex;
                  gap: 12px;
                  border-bottom: 2px solid rgba(52, 211, 153, 0.1);
                }

                .tab {
                  background: transparent;
                  border: none;
                  padding: 16px 24px;
                  font-size: 15px;
                  font-weight: 600;
                  color: #9ca3af;
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  gap: 8px;
                  border-bottom: 3px solid transparent;
                  transition: all 0.3s ease;
                  position: relative;
                  bottom: -2px;
                }

                .tab:hover {
                  color: #d1d5db;
                  background: rgba(52, 211, 153, 0.05);
                }

                .tab.active {
                  color: #34d399;
                  border-bottom-color: #34d399;
                }

                .tab svg {
                  transition: transform 0.3s ease;
                }

                .tab.active svg {
                  transform: scale(1.1);
                }

                .main-content {
                  max-width: 800px;
                  margin: 40px auto;
                  padding: 0 32px;
                }

                .message {
                  background: rgba(52, 211, 153, 0.1);
                  border: 1px solid #34d399;
                  border-radius: 12px;
                  padding: 20px;
                  margin-bottom: 32px;
                  display: flex;
                  gap: 16px;
                  animation: slideIn 0.3s ease;
                }

                .message.error {
                  background: rgba(239, 68, 68, 0.1);
                  border-color: #ef4444;
                }

                .message svg {
                  flex-shrink: 0;
                  margin-top: 2px;
                }

                .message.success svg {
                  color: #34d399;
                }

                .message.error svg {
                  color: #ef4444;
                }

                .message-content {
                  flex: 1;
                }

                .message-text {
                  font-size: 15px;
                  font-weight: 500;
                  margin-bottom: 8px;
                }

                .message-details {
                  font-size: 13px;
                  color: #9ca3af;
                  margin-top: 8px;
                  display: flex;
                  flex-direction: column;
                  gap: 4px;
                }

                @keyframes slideIn {
                  from {
                    opacity: 0;
                    transform: translateY(-10px);
                  }
                  to {
                    opacity: 1;
                    transform: translateY(0);
                  }
                }

                .panel {
                  background: rgba(26, 35, 50, 0.6);
                  backdrop-filter: blur(20px);
                  border: 1px solid rgba(52, 211, 153, 0.15);
                  border-radius: 16px;
                  padding: 32px;
                  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
                  animation: fadeIn 0.4s ease;
                }

                @keyframes fadeIn {
                  from {
                    opacity: 0;
                    transform: translateY(20px);
                  }
                  to {
                    opacity: 1;
                    transform: translateY(0);
                  }
                }

                .panel-header {
                  margin-bottom: 32px;
                  padding-bottom: 20px;
                  border-bottom: 1px solid rgba(52, 211, 153, 0.1);
                }

                .panel-header h2 {
                  font-size: 22px;
                  font-weight: 700;
                  color: #ffffff;
                  margin-bottom: 8px;
                }

                .panel-header p {
                  font-size: 14px;
                  color: #9ca3af;
                }

                .form {
                  display: flex;
                  flex-direction: column;
                  gap: 28px;
                }

                .form-group {
                  display: flex;
                  flex-direction: column;
                  gap: 12px;
                }

                .form-label {
                  font-size: 14px;
                  font-weight: 600;
                  color: #d1d5db;
                  display: flex;
                  align-items: center;
                  gap: 8px;
                }

                .form-label svg {
                  color: #34d399;
                }

                .form-hint {
                  font-size: 13px;
                  color: #6b7280;
                  line-height: 1.5;
                }

                .upload-zone {
                  background: rgba(15, 20, 25, 0.6);
                  border: 2px dashed rgba(52, 211, 153, 0.3);
                  border-radius: 12px;
                  padding: 40px;
                  text-align: center;
                  cursor: pointer;
                  transition: all 0.3s ease;
                }

                .upload-zone:hover {
                  border-color: rgba(52, 211, 153, 0.6);
                  background: rgba(15, 20, 25, 0.8);
                }

                .upload-zone.dragging {
                  border-color: #34d399;
                  background: rgba(52, 211, 153, 0.1);
                  transform: scale(1.02);
                }

                .upload-zone.has-file {
                  border-color: #34d399;
                  background: rgba(52, 211, 153, 0.05);
                }

                .upload-label {
                  cursor: pointer;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  gap: 12px;
                }

                .upload-icon {
                  color: #34d399;
                  transition: transform 0.3s ease;
                }

                .upload-icon.success {
                  animation: bounce 0.5s ease;
                }

                @keyframes bounce {
                  0%, 100% { transform: scale(1); }
                  50% { transform: scale(1.1); }
                }

                .upload-zone:hover .upload-icon {
                  transform: translateY(-4px);
                }

                .upload-text {
                  font-size: 15px;
                  color: #d1d5db;
                }

                .upload-text strong {
                  color: #34d399;
                }

                .upload-hint {
                  font-size: 13px;
                  color: #6b7280;
                }

                .file-name {
                  font-size: 15px;
                  font-weight: 600;
                  color: #34d399;
                }

                .file-size {
                  font-size: 13px;
                  color: #9ca3af;
                }

                .date-input {
                  background: rgba(15, 20, 25, 0.6);
                  border: 1px solid rgba(52, 211, 153, 0.2);
                  border-radius: 8px;
                  padding: 14px 16px;
                  font-size: 15px;
                  color: #e4e7eb;
                  transition: all 0.3s ease;
                  font-family: 'Monaco', 'Courier New', monospace;
                  letter-spacing: 0.5px;
                }

                .date-input:focus {
                  outline: none;
                  border-color: #34d399;
                  background: rgba(15, 20, 25, 0.8);
                  box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.1);
                }

                .date-input::placeholder {
                  color: #6b7280;
                }

                .form-row {
                  display: grid;
                  grid-template-columns: 1fr 1fr;
                  gap: 20px;
                }

                .submit-button {
                  background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
                  border: none;
                  border-radius: 10px;
                  padding: 16px 32px;
                  font-size: 15px;
                  font-weight: 600;
                  color: #0f1419;
                  cursor: pointer;
                  display: flex;
                  align-items: center;
